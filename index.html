    const resultCountEl = document.getElementById('resultCount');
    const totalCountEl = document.getElementById('totalCount');
    const emptyState = document.getElementById('emptyState');

    function uniqueSorted(arr) {
      return Array.from(new Set(arr)).sort((a, b) => a.localeCompare(b, 'zh-Hant'));
    }

    function populateCountyOptions() {
      const counties = uniqueSorted(PRODUCT_DATA.map(r => r.county));
      counties.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c;
        opt.textContent = c;
        countySelect.appendChild(opt);
      });
    }

    function populateCompanyOptions(filterCounty) {
      const prevValue = companySelect.value;
      companySelect.innerHTML = '<option value="">全部業者</option>';
      const pool = filterCounty
        ? PRODUCT_DATA.filter(r => r.county === filterCounty)
        : PRODUCT_DATA;
      const companies = uniqueSorted(pool.map(r => r.company));
      companies.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c;
        opt.textContent = c;
        companySelect.appendChild(opt);
      });
      if (companies.includes(prevValue)) {
        companySelect.value = prevValue;
      }
    }

    function escapeHtml(str) {
      return str.replace(/[&<>"']/g, m => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[m]));
    }

    function highlight(text, keyword) {
      if (!keyword) return escapeHtml(text);
      const safeText = escapeHtml(text);
      const safeKeyword = escapeHtml(keyword);
      const idx = safeText.toLowerCase().indexOf(safeKeyword.toLowerCase());
      if (idx === -1) return safeText;
      return safeText.slice(0, idx) +
        '<span class="highlight">' + safeText.slice(idx, idx + safeKeyword.length) + '</span>' +
        safeText.slice(idx + safeKeyword.length);
    }

    function renderTable() {
      const county = countySelect.value;
      const company = companySelect.value;
      const keyword = keywordInput.value.trim();

      const filtered = PRODUCT_DATA.filter(r => {
        if (county && r.county !== county) return false;
        if (company && r.company !== company) return false;
        if (keyword && !r.product.toLowerCase().includes(keyword.toLowerCase())) return false;
        return true;
      });

      tableBody.innerHTML = '';
      if (filtered.length === 0) {
        emptyState.classList.remove('d-none');
      } else {
        emptyState.classList.add('d-none');
        const frag = document.createDocumentFragment();
        filtered.forEach(r => {
          const tr = document.createElement('tr');
          tr.innerHTML =
            '<td class="text-muted">' + r.no + '</td>' +
            '<td><span class="badge badge-county">' + escapeHtml(r.county) + '</span></td>' +
            '<td>' + escapeHtml(r.company) + '</td>' +
            '<td>' + highlight(r.product, keyword) + '</td>';
          frag.appendChild(tr);
        });
        tableBody.appendChild(frag);
      }

      resultCountEl.textContent = filtered.length;
    }

    countySelect.addEventListener('change', () => {
      populateCompanyOptions(countySelect.value);
      renderTable();
    });
    companySelect.addEventListener('change', renderTable);
    keywordInput.addEventListener('input', renderTable);

    resetBtn.addEventListener('click', () => {
      countySelect.value = '';
      populateCompanyOptions('');
      companySelect.value = '';
      keywordInput.value = '';
      renderTable();
    });

    populateCountyOptions();
    populateCompanyOptions('');
    totalCountEl.textContent = PRODUCT_DATA.length;
    renderTable();
  </script>
</body>

</html>
